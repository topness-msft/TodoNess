<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoIQ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #2564cf;
  --accent-light: #e8f0fe;
  --accent-hover: #1b4fa0;
  --header-bg: #2564cf;
  --bg: #ffffff;
  --bg-sidebar: #f5f5f5;
  --bg-hover: #f0f0f0;
  --bg-selected: #e8f0fe;
  --bg-detail: #faf9f8;
  --bg-input: #f5f5f5;
  --text: #242424;
  --text-secondary: #616161;
  --text-muted: #adadad;
  --border: #e8e8e8;
  --checkbox: #b4b4b4;
  --success: #107c10;
  --danger: #d13438;
  --warning: #f7630c;
  --ai: #8b5cf6;
  --ai-light: #f3f0ff;
  --ai-border: #d4c5f9;
  --ready-green: #107c10;
  --ready-light: #dff6dd;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 8px;
}

.dark {
  --accent: #4a98f7; --accent-light: #1a3050; --accent-hover: #6aafff;
  --header-bg: #1a3a6a;
  --bg: #1f1f1f; --bg-sidebar: #2b2b2b; --bg-hover: #383838;
  --bg-selected: #1a3050; --bg-detail: #2b2b2b; --bg-input: #333333;
  --text: #e8e8e8; --text-secondary: #c0c0c0; --text-muted: #8a8a8a;
  --border: #4a4a4a; --checkbox: #707070;
  --ai: #a78bfa; --ai-light: #2d2640; --ai-border: #5b4a8a;
  --ready-green: #4caf50; --ready-light: #1e3a1e;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

body {
  font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden; font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

.app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ───────────────────────────────────────────── */
.header-bar {
  background: var(--header-bg); color: #fff;
  display: flex; align-items: center;
  padding: 0 16px; height: 48px; flex-shrink: 0; gap: 16px; z-index: 10;
}
.header-brand { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; min-width: 200px; }
.header-brand-icon {
  width: 24px; height: 24px; background: rgba(255,255,255,0.2);
  border-radius: 5px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.header-search { flex: 1; max-width: 500px; position: relative; }
.header-search input {
  width: 100%; padding: 6px 12px 6px 34px; border: none; border-radius: 4px;
  background: rgba(255,255,255,0.15); color: #fff; font-size: 14px;
  font-family: inherit; outline: none; transition: background 0.15s;
}
.header-search input::placeholder { color: rgba(255,255,255,0.7); }
.header-search input:focus { background: rgba(255,255,255,0.25); }
.header-search .s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.7; }
.header-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.header-btn {
  width: 36px; height: 36px; border: none; background: transparent;
  border-radius: 6px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; color: rgba(255,255,255,0.85); transition: background 0.12s;
}
.header-btn:hover { background: rgba(255,255,255,0.15); }
.header-btn.syncing { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin: 0 4px; }
/* (time-saved pill removed — now in briefing card) */

/* ── Body ─────────────────────────────────────────────── */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ──────────────────────────────────────────── */
.sidebar {
  width: 260px; min-width: 260px; background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; user-select: none; overflow-y: auto;
}
.nav-list { list-style: none; padding: 8px 10px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: 6px; cursor: pointer;
  transition: background 0.12s; position: relative;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active { background: var(--bg-selected); font-weight: 600; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 25%; height: 50%;
  width: 3px; border-radius: 2px; background: var(--accent);
}
.nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.nav-label { flex: 1; font-size: 13.5px; }
.nav-count { font-size: 12px; color: var(--text-secondary); min-width: 16px; text-align: right; }
.nav-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px;
  flex-shrink: 0;
}
.nav-badge.ai { background: var(--ai); color: #fff; }
.nav-divider { border: none; border-top: 1px solid var(--border); margin: 6px 18px; }

/* ── List Panel ───────────────────────────────────────── */
.list-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.list-header { padding: 20px 24px 0; display: flex; align-items: baseline; gap: 12px; }
.list-title { font-size: 20px; font-weight: 600; }
.list-title.accent { color: var(--accent); }
.list-date { font-size: 13px; color: var(--text-secondary); }
.list-toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 6px 24px; border-bottom: 1px solid var(--border);
}
.toolbar-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border: none; background: transparent;
  border-radius: 4px; cursor: pointer; font-size: 12px;
  font-family: inherit; color: var(--text-secondary); transition: background 0.12s;
}
.toolbar-btn:hover { background: var(--bg-hover); color: var(--text); }
.toolbar-spacer { flex: 1; }

/* ── Add Bar ──────────────────────────────────────────── */
.add-bar {
  margin: 10px 24px 0; display: flex; align-items: center;
  gap: 12px; padding: 10px 14px;
  background: var(--bg-input); border-radius: var(--radius);
  border: 1px solid transparent; transition: all 0.15s;
}
.add-bar:focus-within { background: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.add-bar .add-icon { color: var(--accent); font-size: 18px; font-weight: 300; width: 20px; text-align: center; }
.add-bar input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; font-family: inherit; color: var(--text); }
.add-bar input::placeholder { color: var(--text-muted); }
.add-ai-hint { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ai); opacity: 0.65; white-space: nowrap; transition: opacity 0.15s; }
.add-bar:focus-within .add-ai-hint { opacity: 1; }

/* ── Task List ────────────────────────────────────────── */
.task-list { flex: 1; overflow-y: auto; padding: 6px 12px 24px; }
.task-list::-webkit-scrollbar { width: 5px; }
.task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.task-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 14px; border-radius: 6px; cursor: pointer; transition: background 0.1s;
}
.task-row:hover { background: var(--bg-hover); }
.task-row.selected { background: var(--bg-selected); }

.task-check {
  width: 20px; height: 20px; min-width: 20px;
  border: 2px solid var(--checkbox); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin-top: 2px; flex-shrink: 0;
}
.task-check:hover { border-color: var(--accent); background: var(--accent-light); }
.task-check.checked { border-color: var(--accent); background: var(--accent); }
.task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.task-promote {
  width: 20px; height: 20px; min-width: 20px;
  border: 2px solid var(--ai); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin-top: 2px; flex-shrink: 0;
  color: var(--ai); font-size: 13px; font-weight: 600; background: transparent;
}
.task-promote:hover { background: var(--ai); color: #fff; }

.task-body { flex: 1; min-width: 0; }

/* Line 1: title row with due date pushed right */
.task-line1 { display: flex; align-items: baseline; gap: 8px; }
.task-title { font-size: 14px; line-height: 1.4; color: var(--text); word-break: break-word; flex: 1; min-width: 0; }
.task-row.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
.task-due {
  font-size: 12px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0;
}
.task-due.overdue { color: var(--danger); }
.task-due.due-soon { color: var(--accent); }

/* Line 2: context line — AI hint · description · person */
.task-line2 {
  display: flex; align-items: center; gap: 6px; margin-top: 3px;
  font-size: 12px; color: var(--text-secondary); line-height: 1.3;
  overflow: hidden;
}
.task-line2 .l2-sep { color: var(--border); flex-shrink: 0; }

.task-hint {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.task-hint.ai-ready { color: var(--ready-green); }
.task-hint.in-prog { color: #0e6a0e; }
.dark .task-hint.in-prog { color: #6abf69; }

.task-desc-snippet {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; color: var(--text-muted);
}

.task-person {
  display: inline-flex; align-items: center; gap: 3px;
  flex-shrink: 0; color: var(--text-muted); font-size: 12px;
}
.task-person .tp-avatar {
  width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 8px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
}
.task-people { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 1; overflow: hidden; }

.status-pill {
  font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
  flex-shrink: 0; margin-left: 4px; line-height: 16px;
}
.status-pill.waiting { background: #fff3e0; color: #e65100; }
.status-pill.snoozed { background: #f0f0f0; color: #888; }
.status-pill.checked { background: #dff6dd; color: #107c10; }
.status-pill.pending { background: #e8f0fe; color: #2564cf; }
.status-pill.unclear { background: #fff3e0; color: #9e6b00; }
.dark .status-pill.waiting { background: #3e2723; color: #ffab40; }
.dark .status-pill.snoozed { background: #333; color: #999; }
.dark .status-pill.checked { background: #1e3a1e; color: #4caf50; }
.dark .status-pill.pending { background: #1a3050; color: #6aafff; }
.dark .status-pill.unclear { background: #3e3010; color: #e0a020; }

.priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.priority-dot.p1 { background: var(--danger); }
.priority-dot.p2 { background: var(--warning); }

.task-right { display: flex; align-items: flex-start; gap: 2px; flex-shrink: 0; margin-top: 2px; }

.task-star {
  color: var(--text-muted); font-size: 15px; cursor: pointer;
  transition: color 0.12s; padding: 2px;
}
.task-star:hover { color: var(--warning); }
.task-star.starred { color: var(--warning); }

.task-overflow {
  opacity: 0; transition: opacity 0.1s;
  width: 26px; height: 26px; border: none; background: transparent;
  border-radius: 4px; cursor: pointer; font-size: 15px;
  color: var(--text-secondary); display: flex; align-items: center;
  justify-content: center;
}
.task-row:hover .task-overflow { opacity: 1; }

/* ── Detail Panel ─────────────────────────────────────── */
.detail-panel {
  width: 340px; min-width: 260px; max-width: 60vw; background: var(--bg-detail);
  border-left: 1px solid var(--border);
  display: none; flex-direction: column; overflow-y: auto;
}
.detail-panel.open { display: flex; }
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.resize-handle {
  width: 4px; cursor: col-resize; background: transparent;
  position: relative; z-index: 10; flex-shrink: 0; display: none;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); opacity: 0.5; }
.detail-panel.open ~ .dummy, .detail-panel.open + .dummy { }

.detail-header { padding: 20px 20px 0; display: flex; align-items: flex-start; gap: 12px; }
.detail-header .task-check, .detail-header .task-promote { margin-top: 4px; }
.detail-title { flex: 1; font-size: 16px; font-weight: 600; line-height: 1.4; color: var(--text); }
.detail-close {
  width: 28px; height: 28px; border: none; background: transparent;
  border-radius: 4px; cursor: pointer; font-size: 18px;
  color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
}
.detail-close:hover { background: var(--bg-hover); }

.detail-description { padding: 8px 20px 8px 52px; font-size: 13px; line-height: 1.5; color: var(--text-secondary); }

.detail-rows { padding: 4px 0; }
.detail-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 20px; cursor: pointer; transition: background 0.1s;
  font-size: 13px; color: var(--text-secondary);
}
.detail-row:hover { background: var(--bg-hover); }
.detail-row .row-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
.detail-row .row-label { flex: 1; }
.detail-row.has-value .row-label { color: var(--text); }

.people-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.person-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; background: var(--bg-hover);
  border-radius: 12px; font-size: 12px; color: var(--text);
}
.person-avatar {
  width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 9px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}

.detail-sep { border: none; border-top: 1px solid var(--border); margin: 4px 20px; }

.detail-notes { padding: 10px 20px; }
.detail-notes textarea {
  width: 100%; min-height: 60px; border: none; background: transparent;
  font-family: inherit; font-size: 13px; color: var(--text);
  resize: vertical; outline: none; line-height: 1.5;
}
.detail-notes textarea::placeholder { color: var(--text-muted); }

.detail-footer {
  margin-top: auto; padding: 10px 20px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
  display: flex; justify-content: space-between; align-items: center;
}
.detail-footer .icon-btn {
  width: 26px; height: 26px; border: none; background: transparent;
  border-radius: 4px; cursor: pointer; font-size: 15px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
}

/* Suggestion actions */
.detail-actions { padding: 10px 20px 10px 52px; display: flex; gap: 8px; }
.btn {
  padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; border: 1px solid transparent; transition: all 0.12s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ai { background: var(--ai); color: #fff; }
.btn-ai:hover { opacity: 0.9; }
.btn-secondary { background: transparent; color: var(--text-secondary); border-color: var(--border); }
.btn-secondary:hover { background: var(--bg-hover); color: var(--text); }

/* ── AI Action Card (replaces coaching) ───────────────── */
.ai-action-card {
  margin: 8px 20px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--ai-border); background: var(--ai-light);
}

.ai-action-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--ai);
}

.ai-action-header .ai-type { flex: 1; }

.ai-action-body {
  padding: 0 14px 12px; font-size: 13px; line-height: 1.55;
  color: var(--text); white-space: pre-wrap;
}

.ai-action-body .draft-block {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; margin: 6px 0;
  font-size: 13px; line-height: 1.5; color: var(--text);
}

.ai-action-body .time-slots { display: flex; flex-direction: column; gap: 4px; margin: 6px 0; }
.time-slot {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; transition: all 0.12s; font-size: 13px;
}
.time-slot:hover { border-color: var(--ai); background: var(--accent-light); }
.time-slot .slot-day { font-weight: 600; min-width: 40px; }
.time-slot .slot-time { color: var(--text-secondary); flex: 1; }
.time-slot .slot-pick { color: var(--ai); font-weight: 600; opacity: 0; transition: opacity 0.1s; font-size: 12px; }
.time-slot:hover .slot-pick { opacity: 1; }

.ai-action-footer {
  display: flex; gap: 6px; padding: 0 14px 10px;
}

.ai-btn {
  padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer; border: none; transition: all 0.12s;
}
.ai-btn-primary { background: var(--ai); color: #fff; }
.ai-btn-primary:hover { opacity: 0.85; }
.ai-btn-secondary { background: transparent; color: var(--ai); border: 1px solid var(--ai-border); }
.ai-btn-secondary:hover { background: var(--ai-light); }

/* (alt-picklist removed — Fix 5/7) */

/* ── Overflow Menu ────────────────────────────────────── */
.overflow-menu {
  position: fixed; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: var(--shadow);
  min-width: 180px; padding: 4px 0; z-index: 1000; display: none;
}
.overflow-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; font-size: 13px; color: var(--text);
  cursor: pointer; transition: background 0.1s;
}
.overflow-item:hover { background: var(--bg-hover); }
.overflow-item .ov-icon { width: 18px; text-align: center; }
.overflow-item.danger { color: var(--danger); }
.overflow-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* ── Toast ────────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--text); color: var(--bg); padding: 10px 20px;
  border-radius: 8px; font-size: 13px; box-shadow: var(--shadow);
  animation: toast-in 0.25s ease;
}
@keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

/* ── Morning Briefing ─────────────────────────────────── */
.briefing-card {
  margin: 12px 24px 4px; padding: 16px 18px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--ai-light) 100%);
  border: 1px solid var(--ai-border);
}
.briefing-greeting { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.briefing-items { display: flex; flex-direction: column; gap: 4px; }
.briefing-item { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.briefing-item:hover { background: rgba(0,0,0,0.04); color: var(--accent); }
.dark .briefing-item:hover { background: rgba(255,255,255,0.06); }
.briefing-item .bi-icon { flex-shrink: 0; }
.briefing-dismiss { margin-top: 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; border: none; background: none; font-family: inherit; }
.briefing-dismiss:hover { color: var(--text); }

/* ── Ghost Preview (suggestions) ─────────────────────── */
.ghost-preview {
  margin-top: 5px; padding: 6px 10px; border-radius: 6px;
  background: var(--ai-light); border: 1px dashed var(--ai-border);
  font-size: 12px; color: var(--ai); line-height: 1.4;
  max-height: 38px; overflow: hidden; opacity: 0.75;
  transition: opacity 0.15s;
}
.task-row:hover .ghost-preview { opacity: 1; }

/* ── Section Headers (My Day groups) ─────────────────── */
.section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 14px 6px; font-size: 13px; font-weight: 600; color: var(--text);
}
.section-header:first-child { padding-top: 8px; }
.section-header .sh-icon { font-size: 15px; }
.section-header .sh-count {
  font-size: 11px; font-weight: 400; color: var(--text-muted);
}
.section-header .sh-see-all {
  font-size: 12px; font-weight: 400; color: var(--accent); cursor: pointer;
  margin-left: auto; white-space: nowrap;
}
.section-header .sh-see-all:hover { text-decoration: underline; }
.section-header.ai { color: var(--ai); }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 4px 14px; }

/* ── Streak Badge ─────────────────────────────────────── */
.streak-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px;
  background: #fff3e0; color: #e65100; font-size: 11px; font-weight: 600;
  margin-left: 10px;
}
.dark .streak-badge { background: #3e2723; color: #ffab40; }

/* ── Sent via TodoIQ ──────────────────────────────────── */
.sent-via {
  font-size: 10px; color: var(--text-muted); font-style: italic;

// ── Render Tasks ───────────────────────────────────────────
function renderTasks() {
  const v = VIEWS.find(v => v.id===currentView);
  let list = tasks.filter(v.filter);
  if (searchQuery) list = list.filter(t =>
    String(t.id).includes(searchQuery) ||
    t.title.toLowerCase().includes(searchQuery) ||
    (t.description||'').toLowerCase().includes(searchQuery) ||
    (t.key_people||[]).some(p => p.name.toLowerCase().includes(searchQuery)));
  const el = document.getElementById('task-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">${v.emptyIcon}</div>
      <div class="empty-title">${searchQuery?'No matching tasks':v.emptyTitle}</div>
      <div class="empty-subtitle">${searchQuery?'Try a different search':v.emptySub}</div></div>`;
    return;
  }

  // My Day: grouped into sections
  if (v.grouped && !searchQuery) {
    const allSuggestions = list.filter(t => t.status==='suggested');
    // Sort suggestions: by priority (ascending), then newest first
    allSuggestions.sort((a, b) => {
      const pa = parseInt((a.priority||'P3').replace('P',''));
      const pb = parseInt((b.priority||'P3').replace('P',''));
      if (pa !== pb) return pa - pb;
      return (b.created_at||'').localeCompare(a.created_at||'');
    });
    const MAX_SUGGESTIONS = 7;
    const suggestions = allSuggestions.slice(0, MAX_SUGGESTIONS);
    const active = list.filter(t => t.status!=='suggested');
    // AI picks top focus tasks: due soonest, highest priority, has AI output
    const focus = pickFocus(active, 5);
    const rest = active.filter(t => !focus.includes(t));

    let html = '';
    if (suggestions.length) {
      const moreCount = allSuggestions.length - suggestions.length;
      const seeAll = allSuggestions.length > MAX_SUGGESTIONS
        ? `<span class="sh-see-all" onclick="setView('review')">See all ${allSuggestions.length} in Suggestions →</span>`
        : allSuggestions.length > 0
        ? `<span class="sh-see-all" onclick="setView('review')">See all in Suggestions →</span>`
        : '';
      html += `<div class="section-header ai"><span class="sh-icon">⬦</span> New for you <span class="sh-count">${allSuggestions.length}</span>${seeAll}</div>`;
      html += suggestions.map(t => renderRow(t, true)).join('');
    }
    if (focus.length) {
      if (suggestions.length) html += '<hr class="section-divider">';
      html += `<div class="section-header"><span class="sh-icon">◎</span> Today's focus <span class="sh-see-all" onclick="setView('ready')">See all in Ready →</span></div>`;
      html += focus.map(t => renderRow(t)).join('');
    }
    if (rest.length) {
      html += '<hr class="section-divider">';
      html += `<div class="section-header"><span class="sh-icon">▪</span> Other tasks <span class="sh-count">${rest.length}</span><span class="sh-see-all" onclick="setView('all')">See all in All Tasks →</span></div>`;
      html += rest.map(t => renderRow(t)).join('');
    }
    el.innerHTML = html;
    return;
  }

  // Waiting & Snoozed view — with filter pills and subsections
  if (currentView === 'waiting' && !searchQuery) {
    const allItems = list;
    const resolvedItems = allItems.filter(t => t._wa_status === 'likely_resolved' || (t._wa_summary && /replied|resolved|confirmed/i.test(t._wa_summary)));
    const waitingItems = allItems.filter(t => !resolvedItems.includes(t));

    const resolvedCount = resolvedItems.length;
    const waitingCount = waitingItems.length;

    const filterBar = `<div class="filter-bar">
      <button class="filter-pill${waitingFilter==='all'?' active':''}" onclick="waitingFilter='all';refresh()">All (${allItems.length})</button>
      <button class="filter-pill${waitingFilter==='waiting'?' active':''}" onclick="waitingFilter='waiting';refresh()">Still waiting (${waitingCount})</button>
      <button class="filter-pill${waitingFilter==='resolved'?' active':''}" onclick="waitingFilter='resolved';refresh()">Resolved (${resolvedCount})</button>
    </div>`;

    if (waitingFilter === 'resolved') list = resolvedItems;
    else if (waitingFilter === 'waiting') list = waitingItems;

    const waiting = list.filter(t => t.status === 'waiting');
    const snoozed = list.filter(t => t.status === 'snoozed');
    let html = filterBar;
    if (waiting.length) {
      html += `<div class="section-header"><span class="sh-icon">↗</span> Waiting on others <span class="sh-count">${waiting.length}</span></div>`;
      html += waiting.map(t => renderRow(t)).join('');
    }
    if (snoozed.length) {
      if (waiting.length) html += '<hr class="section-divider">';
      html += `<div class="section-header"><span class="sh-icon">◑</span> Snoozed by me <span class="sh-count">${snoozed.length}</span></div>`;
      html += snoozed.map(t => renderRow(t)).join('');
    }
    if (!waiting.length && !snoozed.length) {
      html += `<div class="empty-state"><div class="empty-title">No matching tasks</div><div class="empty-subtitle">Try a different filter</div></div>`;
    }
    el.innerHTML = html;
    return;
  }

  // Suggestions view — with resolution filter pills
  if (currentView === 'review' && !searchQuery) {
    const resolvedSugs = list.filter(t => t._wa_status === 'likely_resolved');
    const pendingSugs = list.filter(t => t._wa_status === 'still_pending' || !t._wa_status);
    const unclearSugs = list.filter(t => t._wa_status === 'unclear');

    const filterBar = `<div class="filter-bar">
      <button class="filter-pill${sugFilter==='all'?' active':''}" onclick="sugFilter='all';refresh()">All (${list.length})</button>
      <button class="filter-pill${sugFilter==='pending'?' active':''}" onclick="sugFilter='pending';refresh()">Pending (${pendingSugs.length})</button>
      <button class="filter-pill${sugFilter==='resolved'?' active':''}" onclick="sugFilter='resolved';refresh()">Resolved (${resolvedSugs.length})</button>
      <button class="filter-pill${sugFilter==='unclear'?' active':''}" onclick="sugFilter='unclear';refresh()">Unclear (${unclearSugs.length})</button>
    </div>`;

    let filtered = list;
    if (sugFilter === 'resolved') filtered = resolvedSugs;
    else if (sugFilter === 'pending') filtered = pendingSugs;
    else if (sugFilter === 'unclear') filtered = unclearSugs;

    el.innerHTML = filterBar + filtered.map(t => renderRow(t)).join('');
  } else {
    el.innerHTML = list.map(t => renderRow(t)).join('');
  }

  // Append "Recently dismissed" in Suggestions view
  if (v.showDismissed) {
    const dismissed = tasks.filter(t => t.status==='dismissed');
    if (dismissed.length) {
      const wasOpen = _dismissedSectionOpen;
      el.insertAdjacentHTML('beforeend',

        </div>
        <div class="dismissed-list" style="display:${wasOpen?'block':'none'}">${dismissed.map(t => renderRow(t)).join('')}</div>`);
    }
  }
}

// AI focus picker: prioritize by due date, priority, and AI readiness
function pickFocus(active, max) {
  const scored = active.map(t => {
    let score = 0;
    if (t.due_date) {
      const d = new Date(t.due_date+'T00:00:00'), today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.ceil((d-today)/864e5);
      if (diff < 0) score += 50;       // overdue
      else if (diff === 0) score += 40; // today
      else if (diff === 1) score += 30; // tomorrow
      else if (diff <= 3) score += 20;  // this week
    }
    if (t.priority==='P1') score += 25;
    else if (t.priority==='P2') score += 15;
    if (t.ai_output) score += 10; // AI has prepared something
    if (t.status==='in_progress') score += 5;
    return { t, score };
  });
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, max).map(s => s.t);
}

function renderRow(t, compact) {
    const isSug = t.status==='suggested', isDone = t.status==='completed';
    const chk = isSug
      ? `<div class="task-promote" onclick="event.stopPropagation();promoteTask(${t.id})" title="Add to tasks">+</div>`
      : `<div class="task-check${isDone?' checked':''}" onclick="event.stopPropagation();toggleComplete(${t.id})"></div>`;
    const starred = ['P1','P2'].includes(t.priority);

    const priDot = t.priority==='P1'?'<span class="priority-dot p1"></span>':t.priority==='P2'?'<span class="priority-dot p2"></span>':'';
    const dueHtml = buildDue(t);
    const line2 = buildLine2(t, isSug);

    const ghost = (isSug && t.ai_output && t.action_type)
      ? `<div class="ghost-preview${compact?' compact':''}">⬦ ${ACTION_HINTS[t.action_type]||'AI action ready'} — ${truncate(t.ai_output, 80)}</div>` : '';

    // Status pill for tasks with activity detection
    let statusPill = '';
    if (t.status === 'waiting') statusPill = '<span class="status-pill waiting">Waiting</span>';
    else if (t.status === 'snoozed') statusPill = '<span class="status-pill snoozed">Snoozed</span>';
    else if (t.status === 'suggested' && t._wa_status === 'likely_resolved') statusPill = '<span class="status-pill checked">Resolved</span>';
    else if (t.status === 'suggested' && t._wa_status === 'still_pending') statusPill = '<span class="status-pill pending">Pending</span>';
    else if (t.status === 'suggested' && t._wa_status === 'unclear') statusPill = '<span class="status-pill unclear">Unclear</span>';
    else if (t.status === 'suggested' && t.suggestion_refreshed_at) statusPill = '<span class="status-pill checked">Checked</span>';

    return `<div class="task-row${isDone?' completed':''}${t.id===selectedId?' selected':''}" onclick="selectTask(${t.id})" title="Task #${t.id}">
      ${chk}<div class="task-body">
        <div class="task-line1">${priDot}<div class="task-title">${esc(t.title)}</div>${statusPill}${dueHtml}</div>
        ${line2?`<div class="task-line2">${line2}</div>`:''}${ghost}
      </div>
      <div class="task-right">
        ${!isSug?`<span class="task-star${starred?' starred':''}" onclick="event.stopPropagation();toggleStar(${t.id})">${starred?'★':'☆'}</span>`:''}
        <button class="task-overflow" onclick="event.stopPropagation();showTaskOverflow(event,${t.id})">⋯</button>
      </div></div>`;
}

function buildDue(t) {
  if (!t.due_date) return '';
  const d = new Date(t.due_date+'T00:00:00'), today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((d-today)/864e5);
  const cls = diff<0?'overdue':diff<=1?'due-soon':'';
  const lbl = diff<0?'Overdue':diff===0?'Today':diff===1?'Tomorrow':d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `<span class="task-due ${cls}">📅 ${lbl}</span>`;
}

function buildLine2(t, isSug) {
  const parts = [];

  // Snoozed badge
  if (t.status==='snoozed') {
    const wakeLabel = t.snoozed_until ? new Date(t.snoozed_until).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : 'later';
    parts.push(`<span class="snooze-badge">◑ Snoozed · wakes ${wakeLabel}</span>`);
  }

  // Suggestion checked/new badge
  if (t.status==='suggested') {
    if (t.suggestion_refreshed_at) {
      parts.push('<span class="task-hint" style="color:var(--success)">✓ Checked</span>');
    }
  }

  // AI hint or status
  if (t.status==='in_progress') {
    parts.push('<span class="task-hint in-prog">▶ In Progress</span>');
  }
  if (t.ai_output && !['completed','suggested','snoozed'].includes(t.status)) {
    const hint = (t.action_type && ACTION_HINTS[t.action_type]) || '⚡ Ready';
    parts.push(`<span class="task-hint ai-ready">${hint}</span>`);
  }
  if (t.status==='waiting' && (t._wa_summary || t.waiting_activity)) {
    const summary = t._wa_summary || t.waiting_activity;
    parts.push(`<span class="snooze-badge">↗ ${esc(truncate(summary, 40))}</span>`);
  }

  // Source icon
  if (t.source_type) {
    const ic = {email:'✉️',teams:'💬',meeting:'📅'};
    if (ic[t.source_type]) parts.push(`<span style="flex-shrink:0">${ic[t.source_type]}</span>`);
  }

  // Description snippet — fills remaining space
  if (t.description) {
    parts.push(`<span class="task-desc-snippet">${esc(truncate(t.description, 80))}</span>`);
  }

  // Key people — show up to 3 with avatars, overflow as +N
  if (t.key_people?.length) {
    if (t.key_people.length > 1) {
      const chips = t.key_people.slice(0, 3).map(p => {
        const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2);
        return `<span class="task-person"><span class="tp-avatar">${initials}</span>${p.name.split(' ')[0]}</span>`;
      });
      const extra = t.key_people.length > 3 ? `<span class="task-person">+${t.key_people.length-3}</span>` : '';
      parts.push(`<span class="task-people">${chips.join('')}${extra}</span>`);
    } else {
      const p = t.key_people[0];
      const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2);
      parts.push(`<span class="task-person"><span class="tp-avatar">${initials}</span>${p.name.split(' ')[0]}</span>`);
    }
  }

  return parts.join('<span class="l2-sep">·</span>');
}

// ── Detail Pane ────────────────────────────────────────────
function selectTask(id) {
  selectedId = id;
  const t = tasks.find(t => t.id===id);
  if (!t) return;
  document.getElementById('detail-panel').classList.add('open');
  showResizeHandle();
  const isSug = t.status==='suggested', isDone = t.status==='completed';
  const chk = isSug
    ? `<div class="task-promote" onclick="promoteTask(${t.id})">+</div>`
    : `<div class="task-check${isDone?' checked':''}" onclick="toggleComplete(${t.id})"></div>`;

  const people = (t.key_people?.length)
    ? `<div class="detail-row has-value"><span class="row-icon">👤</span><div class="row-label">
        <div class="people-chips">${t.key_people.map((p,i)=>{
          const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2);
          const hasAlts = p.alternatives?.length;
          const altClick = hasAlts ? `onclick="event.stopPropagation();togglePersonAlts(${t.id},${i})" style="cursor:pointer"` : '';
          const altIndicator = hasAlts ? `<span class="person-alt-indicator">▼</span>` : '';
          const altDropdown = `<div class="person-alt-dropdown" id="person-alt-${t.id}-${i}" style="display:none">
            <div class="alt-header">Did you mean?</div>
            ${(p.alternatives||[]).map(a=>`<div class="alt-item" onclick="event.stopPropagation();swapPerson(${t.id},${i},'${esc(a.name)}','${esc(a.email)}')">
              <span>${a.name}</span><span class="alt-role">${a.role||''}</span></div>`).join('')}
          </div>`;
          return `<span class="person-chip"><span class="person-avatar">${initials}</span><span ${altClick}>${esc(p.name)}${altIndicator}</span><button class="person-remove" onclick="event.stopPropagation();removePerson(${t.id},${i})">✕</button>${altDropdown}</span>`;
        }).join('')}</div>
        <div class="person-add-row"><button class="person-add-btn" id="person-add-btn-${t.id}" onclick="event.stopPropagation();showPersonAdd(${t.id})">+ Add person</button>
          <input class="person-add-input" id="person-add-input-${t.id}" style="display:none" placeholder="Name" onkeydown="if(event.key==='Enter'){event.stopPropagation();addPerson(${t.id},this.value);}" onblur="hidePersonAdd(${t.id})">
        </div></div></div>`
    : `<div class="detail-row"><span class="row-icon">👤</span><div class="row-label">
        <div class="person-add-row"><button class="person-add-btn" id="person-add-btn-${t.id}" onclick="event.stopPropagation();showPersonAdd(${t.id})">+ Add person</button>
          <input class="person-add-input" id="person-add-input-${t.id}" style="display:none" placeholder="Name" onkeydown="if(event.key==='Enter'){event.stopPropagation();addPerson(${t.id},this.value);}" onblur="hidePersonAdd(${t.id})">
        </div></div></div>`;

  const due = t.due_date
    ? `<div class="detail-row has-value due-date-edit" onclick="event.stopPropagation();showDueMenu(${t.id},this)"><span class="row-icon">📅</span><span class="row-label">Due ${new Date(t.due_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span><button class="due-remove" onclick="event.stopPropagation();removeDueDate(${t.id})" title="Remove due date">✕</button></div>`
    : `<div class="detail-row" style="cursor:pointer" onclick="event.stopPropagation();showDueMenu(${t.id},this)"><span class="row-icon">📅</span><span class="row-label">Add due date</span></div>`;

  const src = t.source_type
    ? `<div class="detail-row has-value source-row" onclick="event.stopPropagation();openSource(${t.id})"><span class="row-icon">${{email:'✉️',teams:'💬',meeting:'📅'}[t.source_type]||'📎'}</span><span class="row-label"><span class="source-label">${{email:'Email',teams:'Teams chat',meeting:'Meeting',chat:'Teams chat'}[t.source_type]||'Source'}</span>${t.source_url?`<span class="source-link">${t.source_snippet?truncate(t.source_snippet,40):'Open in '+ ({email:'Outlook',teams:'Teams',meeting:'Teams',chat:'Teams'}[t.source_type]||'browser')}</span>`:''}</span><span style="margin-left:auto;font-size:11px;color:var(--text-muted);cursor:pointer" onclick="event.stopPropagation();toggleSourceEdit(${t.id})">✎</span></div><div class="source-edit-form" id="source-edit-${t.id}" style="display:none"><input type="url" placeholder="Paste URL" id="source-url-${t.id}" value="${esc(t.source_url||'')}"><button onclick="saveSource(${t.id})">Save</button><button class="source-cancel" onclick="document.getElementById('source-edit-${t.id}').style.display='none'">Cancel</button></div>`
    : `<div class="detail-row" style="cursor:pointer" onclick="event.stopPropagation();toggleSourceEdit(${t.id})"><span class="row-icon">📎</span><span class="row-label">Add source</span></div><div class="source-edit-form" id="source-edit-${t.id}" style="display:none"><input type="url" placeholder="Paste URL" id="source-url-${t.id}"><button onclick="saveSource(${t.id})">Save</button><button class="source-cancel" onclick="document.getElementById('source-edit-${t.id}').style.display='none'">Cancel</button></div>`;

  const sugActions = isSug ? `<div class="detail-actions">
    <button class="btn btn-ai" onclick="promoteTask(${t.id})">✨ Add to Tasks</button>
    <button class="btn btn-secondary" onclick="dismissTask(${t.id})">Dismiss</button></div>` : '';

  // AI Action Card
  let aiCard = '';
  if (t.ai_output && t.action_type) {
    const label = ACTION_LABELS[t.action_type] || '⚡ AI Action';

    let body = '';
    if (t.ai_slots) {
      body = `<div class="time-slots">${t.ai_slots.map(s =>
        `<div class="time-slot" onclick="this.querySelector('.slot-pick').textContent='Booking...';this.style.opacity=0.5;toast('📅 Sending invite for ${s.day} ${s.time}...')">
          <span class="slot-day">${s.day}</span><span class="slot-time">${s.date}, ${s.time}</span>
          <span style="color:var(--text-muted);font-size:11px">${s.note}</span>
          <span class="slot-pick">Book ▸</span></div>`).join('')}</div>`;
    } else {
      const sentVia = ['respond-email','follow-up','awaiting-response'].includes(t.action_type)
        ? '<div class="sent-via">Sent via TodoIQ</div>' : '';
      body = `<div class="draft-block">${esc(t.ai_output)}${sentVia}</div>`;
    }

    const copyBtn = !t.ai_slots ? `<button class="ai-btn ai-btn-primary" onclick="copyAiOutput();this.textContent='Copied ✓';setTimeout(()=>this.textContent='Copy',1500)">Copy</button>` : '';
    const openBtn = t.action_type==='respond-email' ? `<button class="ai-btn ai-btn-secondary" onclick="openWithDraft(${t.id})">Open in Outlook</button>`
      : t.action_type==='follow-up'||t.action_type==='awaiting-response' ? `<button class="ai-btn ai-btn-secondary" onclick="openWithDraft(${t.id})">Open in Teams</button>` : '';

    aiCard = `<div class="ai-action-card">
      <div class="ai-action-header"><span>✦</span><span class="ai-type">${label}</span>
        <button class="ai-btn ai-btn-secondary" style="font-size:11px;padding:2px 8px" onclick="redoSkill(${t.id},'${t.action_type||'general'}',this)">↻ Redo</button></div>
      <div class="ai-action-body">${body}</div>
      <div class="ai-action-footer">${copyBtn}${openBtn}</div></div>`;
  } else if (t.action_type && !t.ai_output) {
    const label = ACTION_LABELS[t.action_type] || '⚡ AI Action';
    aiCard = `<div class="ai-action-card" style="border-style:dashed" id="ai-card-${t.id}">
      <div class="ai-action-header"><span>✦</span><span class="ai-type">${label}</span></div>
      <div class="ai-action-body"><div style="text-align:center;padding:16px;color:var(--text-muted)">
        No AI draft yet<br>
        <span style="color:var(--accent);cursor:pointer;font-size:13px" onclick="redoSkill(${t.id},'${t.action_type}')">✦ Generate ${label}</span>
      </div></div></div>`;
  }

  const created = t.created_at ? new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  // Parse status badge
  let parseBadge = '';
  if (t.parse_status === 'parsing') parseBadge = '<span class="parse-badge parsing"><span class="spin">⏳</span> Parsing...</span>';
  else if (t.parse_status === 'error') parseBadge = `<span class="parse-badge error">⚠️ Parse failed <button class="retry-btn" onclick="event.stopPropagation();retryParse(${t.id})">Retry</button></span>`;

  // Priority as a detail row (simplified: Important / Normal / Low)
  const priColors = {P1:'#d13438',P2:'#e65100',P3:'var(--text-secondary)',P4:'var(--text-muted)'};
  const priLabels = {P1:'Important',P2:'Important',P3:'Normal',P4:'Low'};
  const pri = t.priority || 'P3';
  // Resolution status pill for the detail pane
  let resPill = '';
  if (t._wa_status === 'likely_resolved') resPill = '<span class="status-pill checked" style="margin-left:8px">Resolved</span>';
  else if (t._wa_status === 'still_pending') resPill = '<span class="status-pill pending" style="margin-left:8px">Pending</span>';
  else if (t._wa_status === 'unclear') resPill = '<span class="status-pill unclear" style="margin-left:8px">Unclear</span>';
  else if (t.status === 'waiting') resPill = '<span class="status-pill waiting" style="margin-left:8px">Waiting</span>';
  else if (t.status === 'snoozed') resPill = '<span class="status-pill snoozed" style="margin-left:8px">Snoozed</span>';

  const priRow = `<div class="detail-row has-value" onclick="event.stopPropagation();showPrioritySelector(${t.id})" style="cursor:pointer">
    <span class="row-icon" style="color:${priColors[pri]}">⚑</span>
    <span class="row-label" style="color:${priColors[pri]}">${priLabels[pri]||'Normal'}</span>${resPill}</div>`;

  // Resolved rationale (shown when suggestion-check found resolution)
  const resolvedRationale = (t._wa_status === 'likely_resolved' || t._wa_status === 'still_pending' || t._wa_status === 'unclear') && t._wa_summary
    ? `<div style="padding:6px 20px 6px 52px;font-size:12px;line-height:1.4;color:var(--text-secondary);font-style:italic">${esc(t._wa_summary)}</div>` : '';

  // Snooze as a detail row (like "Remind me" in To Do)
  const snoozeRow = !isSug && !isDone && t.status!=='snoozed'
    ? `<div class="detail-row" onclick="event.stopPropagation();showSnoozePicker(event,${t.id})" style="cursor:pointer">
        <span class="row-icon">◑</span><span class="row-label">Snooze</span></div>` : '';
  const snoozedRow = t.status==='snoozed'
    ? `<div class="detail-row has-value"><span class="row-icon">◑</span><span class="row-label">Snoozed · wakes Apr 14</span>
        <span style="margin-left:auto;color:var(--text-muted);cursor:pointer;font-size:12px" onclick="event.stopPropagation();wakeTask(${t.id})">Wake up</span></div>` : '';

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">${chk}<div class="detail-title" title="Task #${t.id}" onclick="editTitle(${t.id},this)">${esc(t.title)}</div>
      ${parseBadge}
      <button class="detail-close" onclick="closeDetail()">✕</button></div>
    ${priRow}
    ${resolvedRationale}
    <div class="detail-description" onclick="editDescription(${t.id},this)">${esc(t.description||'')}</div>
    ${sugActions}
    <hr class="detail-sep">
    <div class="detail-rows">${due}${people}${src}${snoozeRow}${snoozedRow}</div>
    ${aiCard}
    <hr class="detail-sep">
    <div class="detail-notes"><textarea placeholder="Add a note" oninput="updateNotes(${t.id},this.value)">${esc(t.notes||'')}</textarea></div>
    <div class="detail-footer"><span>Created ${created}</span>
      <button class="detail-footer icon-btn" onclick="showDetailOverflow(event,${t.id})">⋯</button></div>`;
  renderTasks();
}

function closeDetail() { selectedId=null; document.getElementById('detail-panel').classList.remove('open'); hideResizeHandle(); renderTasks(); }

function switchAction(id, newAction) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  t.action_type = newAction;
  // Simulate new AI output
  t.ai_output = `[AI is generating ${ACTION_LABELS[newAction]} for this task...]`;
  t.ai_slots = null;
  toast(`✨ Switching to ${ACTION_LABELS[newAction]}...`);
  selectTask(id);
  setTimeout(() => {
    t.ai_output = `(Regenerated ${ACTION_LABELS[newAction]} output would appear here with real content based on WorkIQ context.)`;
    if (selectedId===id) selectTask(id);
  }, 1500);
}

function copyAiOutput() {
  const t = tasks.find(t=>t.id===selectedId);
  if (t?.ai_output) { navigator.clipboard?.writeText(t.ai_output); toast('Copied to clipboard'); }
}

// ── Actions ────────────────────────────────────────────────
function toggleComplete(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  const wasActive = t.status !== 'completed';
  t.status = t.status==='completed'?'active':'completed';
  if (wasActive && t.status==='completed') {
    toast('Task completed ✓');
    if (t.is_quick_hit) { quickStreak++; }
    showSmartComplete(id);
  } else { toast('Task restored'); }
  refresh(); if(selectedId===id) selectTask(id);
}
function toggleStar(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.priority=['P1','P2'].includes(t.priority)?'P3':'P2';
  refresh(); if(selectedId===id) selectTask(id);
}
function promoteTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status='active'; toast('✨ Added to tasks');
  refresh(); if(selectedId===id) selectTask(id);
}
function dismissTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  const prevStatus = t.status;
  t.status='dismissed';
  if(selectedId===id) closeDetail();
  refresh();
  // Undo toast
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'undo-toast';
  d.innerHTML = `Dismissed — <button class="undo-btn" onclick="undoDismiss(${id},'${prevStatus}');this.closest('.undo-toast').remove()">Undo</button>`;
  c.appendChild(d);
  setTimeout(() => { if(d.parentNode) { d.style.opacity='0'; setTimeout(()=>d.remove(),300); } }, 5000);
}
function undoDismiss(id, prevStatus) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status = prevStatus || 'suggested';
  toast('Restored'); refresh();
}
function deleteTask(id) {
  tasks=tasks.filter(t=>t.id!==id);
  if(selectedId===id) closeDetail(); toast('Deleted'); refresh();
}
function snoozeTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status='snoozed'; toast('😴 Snoozed');
  if(selectedId===id) closeDetail(); refresh();
}
function showSnoozePicker(e, id) {
  e.stopPropagation();
  const t = tasks.find(t=>t.id===id); if(!t) return;
  // Remove existing picker
  let existing = document.getElementById('snooze-picker');
  if (existing) existing.remove();
  const picker = document.createElement('div');
  picker.className = 'snooze-picker';
  picker.id = 'snooze-picker';
  // Build weekday buttons (remaining days this week)
  const today = new Date();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayDay = today.getDay();
  let weekdayBtns = '';
  for (let i = 1; i <= 5; i++) { // Mon-Fri
    if (i > todayDay) {
      const d = new Date(today); d.setDate(d.getDate() + (i - todayDay));
      const isTomorrow = (i - todayDay) === 1;
      const dateStr = d.toISOString().split('T')[0];
      weekdayBtns += `<button class="sp-weekday${isTomorrow?' tomorrow':''}" onclick="doSnooze(${id},'${dateStr}','09:00')">${dayNames[i]}${isTomorrow?' ★':''}</button>`;
    }
  }
  // OOF option
  let oofOption = '';
  if (t.key_people?.length) {
    const oofPerson = t.key_people.find(p => p.oof_until);
    if (oofPerson) {
      const oofDate = new Date(oofPerson.oof_until+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      oofOption = `<div class="sp-oof" onclick="doSnooze(${id},'${oofPerson.oof_until}','09:00')">💤 Until ${oofPerson.name.split(' ')[0]} returns (${oofDate})</div>`;
    }
  }
  const tmrDate = new Date(today); tmrDate.setDate(tmrDate.getDate()+1);
  const tmrStr = tmrDate.toISOString().split('T')[0];
  picker.innerHTML = `
    <div class="sp-option" onclick="doSnoozeHours(${id},1)"><span class="sp-icon">⏰</span> 1 hour</div>
    <div class="sp-option" onclick="doSnoozeHours(${id},4)"><span class="sp-icon">🕓</span> 4 hours</div>
    <hr class="sp-sep">
    <div class="sp-label">This week</div>
    <div class="sp-weekdays">${weekdayBtns || '<span style="font-size:12px;color:var(--text-muted)">No more weekdays</span>'}</div>
    <hr class="sp-sep">
    ${oofOption}
    <div class="sp-label">Pick date & time</div>
    <div class="sp-custom">
      <input type="date" id="snooze-date" value="${tmrStr}">
      <input type="time" id="snooze-time" value="09:00">
      <button onclick="doSnooze(${id},document.getElementById('snooze-date').value,document.getElementById('snooze-time').value)">Go</button>
    </div>`;
  document.body.appendChild(picker);
  const rect = e.currentTarget.getBoundingClientRect();
  picker.style.top = Math.min(rect.bottom + 4, innerHeight - picker.offsetHeight - 8) + 'px';
  picker.style.left = Math.min(rect.left, innerWidth - picker.offsetWidth - 8) + 'px';
  // Close on outside click
  setTimeout(() => {
    const closer = (ev) => { if (!picker.contains(ev.target)) { picker.remove(); document.removeEventListener('click', closer); } };
    document.addEventListener('click', closer);
  }, 0);
}
function doSnoozeHours(id, hours) {
  const d = new Date(); d.setHours(d.getHours() + hours);
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.status = 'snoozed'; t.snoozed_until = d.toISOString();
  const picker = document.getElementById('snooze-picker'); if(picker) picker.remove();
  toast(`😴 Snoozed for ${hours} hour${hours>1?'s':''}`);
  if(selectedId===id) closeDetail(); refresh();
}
function doSnooze(id, dateStr, timeStr) {
  if (!dateStr) return;
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.status = 'snoozed'; t.snoozed_until = `${dateStr}T${timeStr||'09:00'}:00`;
  const picker = document.getElementById('snooze-picker'); if(picker) picker.remove();
  const lbl = new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  toast(`😴 Snoozed until ${lbl}`);
  if(selectedId===id) closeDetail(); refresh();
}
function startTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status='in_progress'; toast('▶ Started'); refresh(); if(selectedId===id) selectTask(id);
}
function wakeTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status='active'; toast('☀️ Woke up'); refresh(); if(selectedId===id) selectTask(id);
}
function addTask() {
  const inp=document.getElementById('add-input'), title=inp.value.trim();
  if(!title) return;
  const t = { id: nextId++, title, status:'active', priority:'P3',
    description:'', key_people:[], notes:'', ai_output:null,
    ai_enriched:false, is_quick_hit: title.length<40, created_at:new Date().toISOString() };
  tasks.unshift(t); inp.value=''; toast('Task added — ✨ AI enriching...');
  setTimeout(() => {
    t.ai_enriched=true; t.action_type='general';
    t.ai_output="Next step: Break this down — what's the very first thing you need to do?";
    refresh(); if(selectedId===t.id) selectTask(t.id);
    toast('✨ AI enrichment complete');
  }, 2000);
  refresh();
}
function updateNotes(id,v) { const t=tasks.find(t=>t.id===id); if(t) t.notes=v; }

// ── Inline Edit Helpers ───────────────────────────────────
function saveTitle(id, text) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const trimmed = text.trim();
  if (trimmed && trimmed !== t.title) { t.title = trimmed; refresh(); }
}
function saveDescription(id, text) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.description = text.trim();
}

// ── Priority Selector ─────────────────────────────────────
function showPrioritySelector(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const pris = ['P1','P2','P3','P4'];
  const labels = {P1:'High',P2:'Important',P3:'Normal',P4:'Low'};
  const colors = {P1:'#d13438',P2:'#e65100',P3:'#2564cf',P4:'#888'};
  const items = pris.map(p => ({
    icon: '⚑', label: `${p} ${labels[p]}`,
    action: () => setPriority(id, p),
    danger: false
  }));
  // Find the row element that was clicked
  const rows = document.querySelectorAll('.detail-row');
  let anchor = rows[0];
  rows.forEach(r => { if(r.textContent.includes('⚑')) anchor = r; });
  showOverflow(anchor, items);
}
function setPriority(id, pri) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.priority = pri;
  refresh(); selectTask(id);
}

// ── Due Date Helpers ──────────────────────────────────────
function showDueMenu(id, anchor) {
  let existing = document.getElementById('due-menu');
  if (existing) existing.remove();
  const today = new Date(); today.setHours(0,0,0,0);
  const tmr = new Date(today); tmr.setDate(tmr.getDate()+1);
  const nextMon = new Date(today); nextMon.setDate(nextMon.getDate() + (8 - nextMon.getDay()) % 7 || 7);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmtShort = d => dayNames[d.getDay()];
  const toISO = d => d.toISOString().split('T')[0];
  const menu = document.createElement('div');
  menu.className = 'due-menu'; menu.id = 'due-menu';
  menu.innerHTML = `
    <div class="dm-label">Due</div>
    <hr class="dm-sep">
    <div class="dm-option" onclick="setDueDate(${id},'${toISO(today)}')"><span>Today</span><span class="dm-day">${fmtShort(today)}</span></div>
    <div class="dm-option" onclick="setDueDate(${id},'${toISO(tmr)}')"><span>Tomorrow</span><span class="dm-day">${fmtShort(tmr)}</span></div>
    <div class="dm-option" onclick="setDueDate(${id},'${toISO(nextMon)}')"><span>Next week</span><span class="dm-day">${fmtShort(nextMon)}</span></div>
    <hr class="dm-sep">
    <div class="dm-option" onclick="pickCustomDate(${id})"><span>Pick a date</span><span class="dm-day">📅</span></div>
    <input type="date" id="due-custom-${id}" style="position:absolute;opacity:0;pointer-events:none" onchange="setDueDate(${id},this.value)">`;
  document.body.appendChild(menu);
  const rect = anchor.getBoundingClientRect();
  menu.style.top = Math.min(rect.bottom + 4, innerHeight - menu.offsetHeight - 8) + 'px';
  menu.style.left = Math.min(rect.left, innerWidth - menu.offsetWidth - 8) + 'px';
  setTimeout(() => {
    const closer = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', closer); } };
    document.addEventListener('click', closer);
  }, 0);
}
function pickCustomDate(id) {
  const inp = document.getElementById('due-custom-'+id);
  if (inp) { inp.style.pointerEvents='auto'; inp.showPicker ? inp.showPicker() : inp.focus(); }
}
function setDueDate(id, val) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.due_date = val || null;
  let existing = document.getElementById('due-menu');
  if (existing) existing.remove();
  toast('📅 Due date set'); refresh(); selectTask(id);
}
function removeDueDate(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.due_date = null;
  toast('📅 Due date removed'); refresh(); selectTask(id);
}

// ── Inline Edit (click-to-input) ──────────────────────────
function editTitle(id, el) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const input = document.createElement('input');
  input.type = 'text'; input.value = t.title;
  input.className = 'detail-title-input';
  input.onblur = () => { saveTitle(id, input.value); selectTask(id); };
  input.onkeydown = (e) => { if(e.key==='Enter') input.blur(); if(e.key==='Escape') selectTask(id); };
  el.replaceWith(input);
  input.focus(); input.select();
}
function editDescription(id, el) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const ta = document.createElement('textarea');
  ta.value = t.description || '';
  ta.className = 'detail-desc-input';
  ta.rows = 3;
  ta.placeholder = 'Add a description';
  ta.onblur = () => { saveDescription(id, ta.value); selectTask(id); };
  ta.onkeydown = (e) => { if(e.key==='Escape') selectTask(id); };
  el.replaceWith(ta);
  ta.focus();
}

// ── Source Edit Helpers ───────────────────────────────────
function extractDraftBody(text) {
  if (!text) return '';
  // Strip metadata lines: Channel:, To:, Subject:, Last interaction:, Urgency:, Tone:, Key points:, ---
  const lines = text.split('\n');
  const filtered = lines.filter(l => {
    const trimmed = l.trim();
    if (!trimmed || trimmed === '---') return false;
    if (/^(Channel|To|Subject|Re:|Last interaction|Urgency|Tone|Key points|Duration|Attendees|Time estimate|Materials|Prep Notes|Before):?\s/i.test(trimmed)) return false;
    if (/^(Suggested meeting slots|Sent via TodoIQ)/i.test(trimmed)) return false;
    if (/^\[[ x]\]/i.test(trimmed)) return true; // keep checklist items
    return true;
  });
  return filtered.join('\n').trim();
}

async function openWithDraft(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const draft = extractDraftBody(t.ai_output || t.skill_output || '');
  if (draft) {
    try {
      await navigator.clipboard.writeText(draft);
      toast('Draft copied — paste it in the reply');
    } catch(e) { /* clipboard may fail without user gesture */ }
  }
  openSource(id);
}

function openSource(id) {
  const t = tasks.find(t=>t.id===id);
  if (t && t.source_url) {
    window.open(t.source_url, '_blank');
  } else {
    toggleSourceEdit(id);
  }
}
function toggleSourceEdit(id) {
  const form = document.getElementById('source-edit-'+id);
  if (form) form.style.display = form.style.display==='none' ? 'flex' : 'none';
}
function saveSource(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const url = document.getElementById('source-url-'+id)?.value?.trim() || '';
  t.source_url = url;
  if (url.includes('teams.microsoft.com')) t.source_type = 'teams';
  else if (url.includes('outlook') || url.includes('mail')) t.source_type = 'email';
  else if (url.includes('sharepoint') || url.includes('calendar')) t.source_type = 'meeting';
  else if (url) t.source_type = t.source_type || 'email';
  const form = document.getElementById('source-edit-'+id);
  if (form) form.style.display = 'none';
  toast('📎 Source updated'); refresh(); selectTask(id);
}

// ── People Helpers ────────────────────────────────────────
function removePerson(id, idx) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.key_people.splice(idx, 1);
  toast('👤 Removed'); selectTask(id);
}
function showPersonAdd(id) {
  const btn = document.getElementById('person-add-btn-'+id);
  const inp = document.getElementById('person-add-input-'+id);
  if (btn) btn.style.display='none';
  if (inp) { inp.style.display='inline-block'; inp.focus(); }
}
function hidePersonAdd(id) {
  setTimeout(() => {
    const btn = document.getElementById('person-add-btn-'+id);
    const inp = document.getElementById('person-add-input-'+id);
    if (btn) btn.style.display='';
    if (inp) { inp.style.display='none'; inp.value=''; }
  }, 150);
}
function addPerson(id, name) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  name = name.trim(); if(!name) return;
  if (!t.key_people) t.key_people = [];
  t.key_people.push({name, email: name.toLowerCase().replace(/\s+/g,'.')+'@contoso.com', alternatives:[]});
  toast('👤 Added '+name); selectTask(id);
}
function togglePersonAlts(id, idx) {
  const dd = document.getElementById('person-alt-'+id+'-'+idx);
  if (dd) dd.style.display = dd.style.display==='none' ? 'block' : 'none';
}
function swapPerson(id, idx, name, email) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const old = t.key_people[idx];
  const oldAlts = old.alternatives || [];
  // Swap: current person becomes an alternative, selected alt becomes primary
  const newAlts = oldAlts.filter(a => a.name !== name);
  newAlts.push({name: old.name, email: old.email, role: ''});
  t.key_people[idx] = {name, email, alternatives: newAlts};
  toast('👤 Swapped to '+name); selectTask(id);
}

// ── Parse Status ──────────────────────────────────────────
function retryParse(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.parse_status = 'parsing';
  toast('⏳ Retrying parse...'); selectTask(id);
  setTimeout(() => { t.parse_status = 'parsed'; toast('✓ Parse complete'); if(selectedId===id) selectTask(id); }, 2000);
}

// ── Filter state ──────────────────────────────────────────
let waitingFilter = 'all'; // 'all', 'resolved', 'waiting'
let sugFilter = 'all'; // 'all', 'resolved', 'pending', 'unclear'
function refresh() { renderNav(); renderBriefing(); renderTasks(); }
function truncate(s,n) { if(!s) return ''; const clean=s.replace(/\n/g,' ').trim(); return clean.length>n ? clean.slice(0,n)+'…' : clean; }

// ── Morning Briefing ──────────────────────────────────────
function renderBriefing() {
  const el = document.getElementById('briefing-container');
  if (currentView !== 'myday' || !briefingVisible) { el.innerHTML=''; return; }
  const sugCount = tasks.filter(t=>t.status==='suggested').length;
  const waitUpdates = tasks.filter(t=>t.status==='waiting' && t.waiting_activity).length;
  const readyCount = tasks.filter(t=>t.ai_output && !['completed','dismissed','deleted','suggested'].includes(t.status)).length;
  const quickCount = tasks.filter(t=>t.is_quick_hit && !['completed','dismissed','deleted','suggested'].includes(t.status)).length;
  el.innerHTML = `<div class="briefing-card">
    <div class="briefing-greeting">Good morning — here's your day</div>
    <div class="briefing-items">
      ${sugCount?`<div class="briefing-item" onclick="setView('review')"><span class="bi-icon">⬦</span> ${sugCount} new suggestion${sugCount>1?'s':''} from overnight email and meetings</div>`:''}
      ${waitUpdates?`<div class="briefing-item" onclick="setView('waiting')"><span class="bi-icon">↗</span> ${waitUpdates} waiting task${waitUpdates>1?'s':''} got a reply</div>`:''}
      ${readyCount?`<div class="briefing-item" onclick="setView('ready')"><span class="bi-icon">◆</span> ${readyCount} tasks have AI actions ready to go</div>`:''}
      ${quickCount?`<div class="briefing-item" onclick="setView('quick')"><span class="bi-icon">◎</span> ${quickCount} quick task${quickCount>1?'s':''} you can knock out fast</div>`:''}
      ${readyCount?`<div class="briefing-item" style="color:var(--ai);font-weight:500">AI actions saved an estimated ~${readyCount * 6} min today</div>`:''}
    </div>
    <button class="briefing-dismiss" onclick="dismissBriefing()">Dismiss</button>
  </div>`;
}
function dismissBriefing() { briefingVisible=false; renderBriefing(); }

// ── Smart Complete ────────────────────────────────────────
function showSmartComplete(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t || !t.ai_output || !t.action_type) return;
  const person = t.key_people?.[0]?.name?.split(' ')[0] || 'them';
  let action = '', btn = '';
  if (t.action_type==='respond-email') { action=`Send the draft reply to ${person}?`; btn='Send Reply'; }
  else if (t.action_type==='follow-up') { action=`Send the follow-up to ${person}?`; btn='Send Message'; }
  else if (t.action_type==='schedule-meeting') { action=`Book the meeting with ${person}?`; btn='Send Invite'; }
  else if (t.action_type==='awaiting-response') { action=`Send the nudge to ${person}?`; btn='Send Nudge'; }
  else return;

  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'smart-toast';
  d.innerHTML = `<div class="smart-toast-title">✓ Task completed</div>
    <div class="smart-toast-sub">${action}</div>
    <div class="smart-toast-btns">
      <button class="btn btn-ai" onclick="this.closest('.smart-toast').remove();toast('✨ ${btn.replace(/'/g,"\\'")} — sent via TodoIQ')">${btn}</button>
      <button class="btn btn-secondary" onclick="this.closest('.smart-toast').remove()">Skip</button>
    </div>`;
  c.appendChild(d);
  setTimeout(() => { if(d.parentNode) { d.style.opacity='0'; setTimeout(()=>d.remove(),300); } }, 8000);
}

// ── Overflows ──────────────────────────────────────────────
function showTaskOverflow(e,id) {
  e.stopPropagation(); const t=tasks.find(t=>t.id===id); if(!t) return;
  let items=[];
  if(t.status==='suggested') items=[{icon:'✨',label:'Add to Tasks',action:()=>promoteTask(id)},{icon:'✕',label:'Dismiss',action:()=>dismissTask(id)}];
  else if(t.status==='active') items=[{icon:'▶',label:'Start',action:()=>startTask(id)},{icon:'⏳',label:'Waiting',action:()=>{t.status='waiting';refresh();toast('Moved');}},{icon:'😴',label:'Snooze',action:()=>snoozeTask(id)},{sep:true},{icon:'🗑',label:'Delete',action:()=>deleteTask(id),danger:true}];
  else if(t.status==='in_progress') items=[{icon:'✓',label:'Complete',action:()=>toggleComplete(id)},{icon:'⏳',label:'Waiting',action:()=>{t.status='waiting';refresh();toast('Moved');}},{icon:'😴',label:'Snooze',action:()=>snoozeTask(id)}];
  else if(t.status==='waiting') items=[{icon:'◀',label:'Make active',action:()=>{t.status='active';refresh();toast('Active');}},{icon:'✓',label:'Complete',action:()=>toggleComplete(id)},{icon:'😴',label:'Snooze',action:()=>snoozeTask(id)}];
  else if(t.status==='snoozed') items=[{icon:'☀️',label:'Wake up',action:()=>{t.status='active';refresh();toast('Woke up');}},{icon:'✓',label:'Complete',action:()=>toggleComplete(id)},{sep:true},{icon:'🗑',label:'Delete',action:()=>deleteTask(id),danger:true}];
  else if(t.status==='dismissed') items=[{icon:'↩',label:'Restore',action:()=>{t.status='suggested';refresh();toast('Restored');}},{icon:'🗑',label:'Delete',action:()=>deleteTask(id),danger:true}];
  else if(t.status==='completed') items=[{icon:'↩',label:'Restore',action:()=>{t.status='active';refresh();toast('Restored');}},{icon:'🗑',label:'Delete',action:()=>deleteTask(id),danger:true}];
  showOverflow(e.currentTarget,items);
}
function showDetailOverflow(e,id) {
  e.stopPropagation();
  showOverflow(e.currentTarget,[
    {icon:'✨',label:'Re-run AI',action:()=>toast('✨ Regenerating...')},
    {sep:true},
    {icon:'🗑',label:'Delete',action:()=>deleteTask(id),danger:true}
  ]);
}
function showListOverflow(e) {
  e.stopPropagation();
  showOverflow(e.currentTarget,[
    {icon:'🔄',label:'Sync with WorkIQ',action:()=>doSync()},
    {icon:'✨',label:'Check suggestions',action:()=>toast('✨ Checking...')},
  ]);
}
function showOverflow(anchor,items) {
  const m=document.getElementById('overflow-menu');
  m.innerHTML=items.map(i=>i.sep?'<hr class="overflow-sep">':`<div class="overflow-item${i.danger?' danger':''}" onclick="event.stopPropagation();hideOverflow();(${i.action.toString()})()">${i.icon?`<span class="ov-icon">${i.icon}</span>`:''}${i.label}</div>`).join('');
  const r=anchor.getBoundingClientRect();
  m.style.display='block';
  m.style.top=Math.min(r.bottom+4,innerHeight-m.offsetHeight-8)+'px';
  m.style.left=Math.min(r.left,innerWidth-m.offsetWidth-8)+'px';
}
function hideOverflow(){document.getElementById('overflow-menu').style.display='none';}

function toggleTheme(){document.body.classList.toggle('dark');document.getElementById('theme-btn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';}
function doSync(){const b=document.getElementById('sync-btn');b.classList.add('syncing');toast('🔄 Syncing with WorkIQ...');setTimeout(()=>{b.classList.remove('syncing');toast('✨ Sync complete — 2 new suggestions');},2000);}
function toast(msg){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ── Resizable Split Pane ──────────────────────────────────
function initResizeHandle() {
  const handle = document.getElementById('resize-handle');
  const detail = document.getElementById('detail-panel');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true; startX = e.clientX; startW = detail.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = startX - e.clientX;
    const newW = Math.min(Math.max(startW + dx, 280), window.innerWidth * 0.6);
    detail.style.width = newW + 'px';
    detail.style.minWidth = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

function showResizeHandle() {
  document.getElementById('resize-handle').style.display = 'block';
}
function hideResizeHandle() {
  document.getElementById('resize-handle').style.display = 'none';
}
